<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Tâm...</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fff0f5;
            font-family: 'Mali', cursive;
            overflow: hidden;
            text-align: center;
        }
        
        /* Container bọc toàn bộ nội dung để nút phóng to không làm vỡ bố cục */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        h1 {
            color: #ff3385;
            font-size: 32px;
            margin: 15px 20px 30px 20px;
            line-height: 1.4;
            transition: 0.3s;
        }

        img {
            width: 250px;
            border-radius: 15px;
            margin-bottom: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* Thêm viền bóng cho ảnh nghiêm chỉnh hơn */
        }

        .buttons {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap; /* Cho phép rớt dòng nếu nút Đồng ý quá to */
        }

        button {
            padding: 12px 25px;
            font-size: 20px;
            font-family: 'Mali', cursive;
            font-weight: 700;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease; /* Hiệu ứng phình to/thu nhỏ mượt mà */
        }

        #btn-yes {
            background-color: #28a745;
        }

        #btn-yes:hover {
            background-color: #218838;
        }

        #btn-no {
            background-color: #dc3545;
        }
    </style>
</head>
<body>

    <div class="container">
        <img id="cute-img" src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExZXR4bmE0czI4NGJycHR3dmt5aWY5aWwwenBia2ppM3Nsc2k0ZGJuMiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/SrKbU4TRDgN8apkkES/giphy.gif" alt="Sad GIF">
        
        <h1 id="question1">Tâm ơi, tha lỗi cho Maxz nhóooo 😭</h1>
        
        <div class="buttons">
            <button id="btn-yes" onclick="accepted()">Em chấp nhận</button>
            <button id="btn-no" onclick="refuse()">Không bao giờ</button>
        </div>
    </div>

    <script>
        let noClickCount = 0;

        // Danh sách 5 GIF bạn cung cấp
        const sadGifs = [
            "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3MHJwbm80MzdtMmxraDBpem9mMHIxZjY4NzgxdWhla3N3NndnZmc1MSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/QW2ccpbEdeI5UBugCh/giphy.gif",
            "https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExb2Ixcmt1b3JyYXM0MmZ4ano4c2dkZGQwYm9zMWc1OXUxN3Byc3F3ZiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/HcAxkcimIhBocYQRc1/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3N3h2b3FwZjUzcWlwaTl4ZTBsYWU5N3JiYWRkbjViaXZuOXEwMnVoYiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/oJvNuFioFPhKSNXwI6/giphy.gif",
            "https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExeTZyY216bDJ4MWx1Y3ZqY3c2NDhsaTJpNnQwNHVnbXo4NzFtZnlycyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/L0crbpKuc6DmFsWa00/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3bjFrM3Vha3IzZDF6ZXBhYWY2N2x1aHFwZXZyYTN0NXA4b3V4NW5qYSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/7IjMP2aWsAEYATMWhW/giphy.gif"
        ];

        // Lời xin lỗi nghiêm túc, chân thành tăng dần mức độ
        const apologies = [
            "Anh thực sự biết lỗi rồi...",
            "Bé tha lỗi cho Anh nha 🥺",
            "Anh hứa sẽ không bao giờ làm bé buồn như vậy nữa",
            "Xin Bé đừng giận Anh nữa mà 😭",
            "Anh ngàn lần xin lỗi Em ạ..."
        ];

        function refuse() {
            noClickCount++;
            
            const btnYes = document.getElementById('btn-yes');
            const btnNo = document.getElementById('btn-no');
            const img = document.getElementById('cute-img');
            const text = document.getElementById('question1');

            // 1. Đổi hình ảnh (Giới hạn ở hình cuối cùng nếu bấm quá nhiều lần)
            const gifIndex = Math.min(noClickCount - 1, sadGifs.length - 1);
            img.src = sadGifs[gifIndex];

            // 2. Đổi text xin lỗi
            const textIndex = Math.min(noClickCount - 1, apologies.length - 1);
            text.innerText = apologies[textIndex];

            // 3. Phóng to nút Đồng Ý (Mỗi lần tăng thêm 25px font chữ và padding)
            const baseFontSize = 20;
            const newFontSize = baseFontSize + (noClickCount * 25);
            const newPaddingV = 12 + (noClickCount * 10);
            const newPaddingH = 25 + (noClickCount * 20);
            
            btnYes.style.fontSize = newFontSize + 'px';
            btnYes.style.padding = `${newPaddingV}px ${newPaddingH}px`;

            // 4. Thu nhỏ dần nút Không
            const noFontSize = Math.max(10, 20 - (noClickCount * 2)); // Nhỏ nhất là 10px
            btnNo.style.fontSize = noFontSize + 'px';
            btnNo.style.padding = '8px 15px';
        }

        function accepted() {
            const img = document.getElementById('cute-img');
            const q1 = document.getElementById('question1');
            const buttons = document.querySelector('.buttons');

            // Đổi sang ảnh Happy chốt kèo
            img.src = "https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExc2xmaThvMXh6bjdpYXR6NTR1d21mbTl4Z2Y4c3RhYnQxaTE4dGlsdCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/vY2fNDZqwtWQ48YoZ9/giphy.gif"; 
            
            // Text thông báo Haidilao
            q1.innerHTML = "🎉 Tuyệt vời quá! Chúc mừng bé đã trúng 1 bữa buffet Hadilao vào cuối tuần này!<br>Liên lạc qua Maxz để nhận thưởng nhé. IUUUU ❤️";
            
            // Giấu nút
            buttons.style.display = 'none';

            // Cấu hình gửi mail (NHỚ ĐỔI EMAIL CỦA BẠN VÀO ĐÂY)
            fetch("https://formsubmit.co/ajax/EMAIL_CUA_BAN@gmail.com", {
                method: "POST",
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({
                    "Thông báo": "ĐẠI THẮNG! Tâm đã tha lỗi và chốt kèo Haidilao rồi!",
                    "Thời gian": new Date().toLocaleString()
                })
            })
            .then(response => console.log("Gửi mail thành công"))
            .catch(error => console.log("Lỗi", error));
        }
    </script>

</body>
</html>
